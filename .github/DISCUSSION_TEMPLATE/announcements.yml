title: "[Announcement] "
labels: ["announcement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📢 Organization Announcement

  - type: markdown
    attributes:
      value: |
        ### Language Option
        - **English** is required.
        - **Chinese** is optional — fill it in if you want to provide a bilingual version.

        ---

  - type: input
    id: title_en
    attributes:
      label: Announcement Title (English)
      description: Summarize the core content of this announcement in one sentence
    validations:
      required: true

  - type: input
    id: title_cn
    attributes:
      label: 公告标题（中文）/ Announcement Title (Chinese)
      description: 如无需双语可留空 / Leave blank if not needed
    validations:
      required: false

  - type: textarea
    id: content_en
    attributes:
      label: Announcement Content (English)
      description: Provide details about the announcement, including effective date, scope of impact, etc.
    validations:
      required: true

  - type: textarea
    id: content_cn
    attributes:
      label: 公告内容（中文）/ Announcement Content (Chinese)
      description: 如无需双语可留空 / Leave blank if not needed
    validations:
      required: false

  - type: input
    id: effective_date
    attributes:
      label: Effective Date
      description: When does this announcement take effect (if applicable)
      placeholder: e.g. 2026-07-01
    validations:
      required: false
